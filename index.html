<!DOCTYPE html>
<html>
<head>
    <title>AGAR.RASPBERYPI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Ubuntu:wght@400;700&display=swap');
        
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Ubuntu', sans-serif; color: #fff; }
        canvas { display: block; }
        
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(20,0,40,0.9) 0%, rgba(0,0,0,1) 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .container {
            background: rgba(10, 10, 15, 0.95); padding: 30px; border-radius: 15px; width: 450px; text-align: center;
            border: 2px solid #00ffff; box-shadow: 0 0 20px #00ffff;
            position: relative;
        }

        h1 { margin-top: 0; font-family: 'Orbitron', sans-serif; color: #00ffff; text-shadow: 0 0 10px #00ffff; font-size: 28px; }
        
        input[type="text"] { 
            width: 80%; padding: 12px; margin: 15px 0; border: 2px solid #00ffff; background: #050505; 
            color: #fff; border-radius: 8px; font-size: 16px; outline: none; 
        }
        
        .skin-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
        .skin-item { width: 100%; aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 2px solid #333; background-size: cover; }
        .skin-item.active { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        
        .mode-selector { display: flex; gap: 5px; margin: 15px 0; justify-content: center; }
        .mode-btn { 
            flex: 1; padding: 10px 5px; font-size: 10px; font-family: 'Orbitron', sans-serif; 
            background: #111; border: 1px solid #444; color: #aaa; cursor: pointer; border-radius: 5px;
        }
        .mode-btn.active { border-color: #00ffff; color: #00ffff; box-shadow: 0 0 10px #00ffff; background: #002222; }

        #playBtn { 
            width: 90%; padding: 15px; background: linear-gradient(45deg, #00ffff, #ff00ff); 
            color: #fff; border: none; border-radius: 8px; font-size: 20px; font-family: 'Orbitron', sans-serif; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        
        #gameUI { display: none; }
        
        /* UI COMPONENTES */
        #leaderboard {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8);
            color: #00ffff; padding: 15px; border-radius: 10px; min-width: 200px; 
            border: 2px solid #ff00ff; pointer-events: none; font-family: 'Orbitron', sans-serif;
        }
        #minimap-container {
            position: absolute; top: 15px; left: 15px; width: 150px; height: 150px;
            background: rgba(0,0,0,0.8); border: 2px solid #00ffff; border-radius: 10px; overflow: hidden;
        }

        /* CHAT SYSTEM */
        #chat-wrapper {
            position: absolute; bottom: 80px; left: 15px; width: 280px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .quick-chat-bar {
            display: flex; gap: 4px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px;
            border: 1px solid rgba(0, 255, 255, 0.2); font-size: 10px; color: #00ffff;
        }
        .quick-btn {
            background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; color: #00ffff;
            padding: 2px 6px; border-radius: 3px; cursor: pointer; font-family: 'Orbitron', sans-serif;
        }
        .quick-btn:hover { background: #00ffff; color: #000; }

        #chat-container {
            height: 180px; background: rgba(0,0,0,0.6); border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px; display: flex; flex-direction: column; overflow: hidden;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; color: #fff; scrollbar-width: none; }
        #chat-input {
            background: rgba(20,20,20,0.9); border: none; border-top: 1px solid #00ffff;
            padding: 10px; color: #fff; outline: none; font-family: 'Ubuntu', sans-serif;
        }

        /* HOME BUTTON */
        #homeBtn {
            position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: rgba(0,0,0,0.8); border: 2px solid #ff00ff; border-radius: 50%;
            color: #ff00ff; font-size: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px #ff00ff;
        }
        #homeBtn:hover { transform: scale(1.1); box-shadow: 0 0 20px #ff00ff; background: #ff00ff; color: #fff; }

        #cropModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #050505; padding: 20px; border-radius: 15px; z-index: 2000; border: 3px solid #00ffff;
        }
        #cropCanvas { border: 2px solid #ff00ff; cursor: crosshair; background: #000; }

        /* CREDITS */
        .credits { margin-top: 20px; font-size: 10px; color: #666; border-top: 1px solid #222; padding-top: 15px; }
        .credits a { color: #ff00ff; text-decoration: none; font-weight: bold; }
        .credits a:hover { text-shadow: 0 0 5px #ff00ff; }
    </style>
</head>
<body>
    <div id="menu">
        <div class="container">
            <h1>AGAR.RASPBERYPI</h1>
            <input type="text" id="playerName" placeholder="ID DEL PILOTO..." maxlength="15">
            
            <div class="skin-list" id="skinSelector"></div>
            
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
            <button id="customBtn" style="background:#111; border:1px dashed #ff00ff; color:#ff00ff; padding:10px; width:90%; margin-bottom:15px; cursor:pointer; margin-top:15px;">📷 SUBIR SKIN</button>
            <button id="playBtn">DESPEGAR</button>

            <div class="credits">
                Desarrollado por <a href="https://github.com/Hyground" target="_blank">Hygroundd</a><br>
                © 2026 Agar.raspberypi - Todos los derechos reservados.
            </div>
        </div>
    </div>

    <div id="gameUI">
        <div id="leaderboard">
            <div style="font-family: 'Orbitron', sans-serif; font-size: 14px; border-bottom: 1px solid #ff00ff; padding-bottom: 5px; margin-bottom: 8px; color: #ff00ff; text-align: center;">TOP PILOTOS</div>
            <div id="scores"></div>
        </div>
        <div id="minimap-container">
            <canvas id="minimap" width="150" height="150"></canvas>
        </div>

        <div id="chat-wrapper">
            <div class="quick-chat-bar">
                <span>Chat rápido:</span>
                <button class="quick-btn" onclick="sendQuick(1)">1</button>
                <button class="quick-btn" onclick="sendQuick(2)">2</button>
                <button class="quick-btn" onclick="sendQuick(3)">3</button>
                <button class="quick-btn" onclick="sendQuick(4)">4</button>
            </div>
            <div id="chat-container">
                <div id="chat-messages"></div>
                <input type="text" id="chat-input" placeholder="Enter para chatear..." maxlength="50">
            </div>
        </div>

        <div id="homeBtn" onclick="returnToMenu()">🏠</div>
    </div>

    <div id="cropModal">
        <canvas id="cropCanvas" width="300" height="300"></canvas>
        <br><br>
        <button id="confirmCrop" style="background: #00ffff; border: none; padding: 10px 20px; cursor: pointer; font-family: 'Orbitron', sans-serif;">CONFIRMAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
