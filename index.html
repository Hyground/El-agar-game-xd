<!DOCTYPE html>
<html>
<head>
    <title>Neon Space Agar</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #00ffff; font-family: 'Courier New', monospace; }
        canvas { display: block; z-index: 1; }
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95); padding: 50px; border: 3px solid #00ffff;
            text-align: center; box-shadow: 0 0 30px #00ffff; z-index: 100; border-radius: 10px;
        }
        input { background: #111; border: 2px solid #00ffff; color: #fff; padding: 15px; margin-bottom: 25px; font-size: 20px; outline: none; width: 300px; text-align: center; }
        button { background: #00ffff; color: #000; border: none; padding: 15px 40px; font-size: 22px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #leaderboard {
            position: absolute; top: 20px; right: 20px; background: rgba(0, 255, 255, 0.1); 
            padding: 20px; border: 2px solid #00ffff; color: #00ffff; min-width: 200px; 
            pointer-events: none; z-index: 10; border-radius: 5px; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="font-size: 45px; text-shadow: 0 0 15px #00ffff;">NEON SPACE</h1>
        <input type="text" id="playerName" placeholder="Tu Nombre..." maxlength="12">
        <br>
        <button id="playBtn">DESPEGAR</button>
    </div>
    
    <div id="leaderboard">
        <h3 style="margin: 0 0 10px 0; text-align: center; border-bottom: 2px solid #00ffff; padding-bottom: 5px;">RANKING ESPACIAL</h3>
        <div id="scores"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
    <script src="hacks.js"></script>
</body>
</html>
